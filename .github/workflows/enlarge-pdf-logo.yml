name: Enlarge protocol PDF logo

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/enlarge-pdf-logo.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Increase PDF logo and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('js/protocol-engine.js')
          text = path.read_text(encoding='utf-8')
          old = 'const logoHeight = 11;'
          new = 'const logoHeight = 15;'
          if text.count(old) != 1:
              raise SystemExit(f'expected one logoHeight declaration, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          node --check js/protocol-engine.js
          grep -F 'const logoHeight = 15;' js/protocol-engine.js
          rm .github/workflows/enlarge-pdf-logo.yml

      - name: Commit change
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/protocol-engine.js .github/workflows/enlarge-pdf-logo.yml
          git commit -m "increase logo size in protocol PDF"
          git push origin HEAD:main
