<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://gc.zgo.at; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.goatcounter.com; object-src 'none'; frame-src 'none'; worker-src 'none'; base-uri 'none'; form-action 'self'; upgrade-insecure-requests">
<title>{{POST_TITLE}} — DLT Academy</title>
<meta name="description" content="{{POST_DESCRIPTION}}">
<meta name="keywords" content="{{POST_KEYWORDS}}">
<link rel="canonical" href="https://dlt.academy/blog/{{POST_SLUG}}/">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:title" content="{{POST_TITLE}}">
<meta property="og:description" content="{{POST_DESCRIPTION}}">
<meta property="og:url" content="https://dlt.academy/blog/{{POST_SLUG}}/">
<meta property="og:image" content="https://dlt.academy/blog/{{POST_SLUG}}/og-image.png">
<meta property="og:locale" content="pt_BR">

<!-- Twitter/X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{POST_TITLE}}">
<meta name="twitter:description" content="{{POST_DESCRIPTION}}">
<meta name="twitter:image" content="https://dlt.academy/blog/{{POST_SLUG}}/og-image.png">

<link rel="icon" type="image/png" href="/assets/dlt-mark.png">
<link rel="stylesheet" href="/styles-base.css">
<link rel="stylesheet" href="../styles-blog.css">

</head>
<body>

<header class="top">
  <div class="wrap">
    <a class="brand" href="/"><img src="/assets/dlt-logo-light.png" alt="DLT Academy"></a>
  </div>
</header>

<main>
  <div class="article-wrap article">

    <div class="article-meta">
      <span class="tag s2">{{POST_TAG}}</span>
      <time datetime="{{POST_DATE_ISO}}">{{POST_DATE}}</time>
    </div>
    <h1>{{POST_TITLE}}</h1>

    <div class="article-body">
{{POST_BODY}}
    </div>

  </div>
</main>

<footer>
  <div class="wrap">
    <p>Conteúdo educacional. Não é recomendação de investimento.</p>
    <p>© 2026 dltacademy</p>
  </div>
</footer>

</body>
</html>
