<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://gc.zgo.at; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.goatcounter.com; object-src 'none'; frame-src 'none'; worker-src 'none'; base-uri 'none'; form-action 'self'; upgrade-insecure-requests">
<title>{{POST_TITLE}} — DLT Academy</title>
<meta name="description" content="{{POST_DESCRIPTION}}">
<link rel="canonical" href="https://dlt.academy/blog/{{POST_SLUG}}/">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="DLT Academy">
<meta property="og:title" content="{{POST_TITLE}}">
<meta property="og:description" content="{{POST_DESCRIPTION}}">
<meta property="og:url" content="https://dlt.academy/blog/{{POST_SLUG}}/">
<meta property="og:image" content="https://dlt.academy/blog/{{POST_SLUG}}/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{POST_OG_ALT}}">
<meta property="og:locale" content="pt_BR">

<!-- Twitter/X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{POST_TITLE}}">
<meta name="twitter:description" content="{{POST_DESCRIPTION}}">
<meta name="twitter:image" content="https://dlt.academy/blog/{{POST_SLUG}}/og-image.png">
<meta name="twitter:image:alt" content="{{POST_OG_ALT}}">

<meta name="theme-color" content="#06090F">
<link rel="icon" type="image/png" href="/assets/dlt-mark.png">
<link rel="stylesheet" href="/styles-base.css">
<link rel="stylesheet" href="../styles-blog.css">


<!-- Dados estruturados (JSON-LD é bloco de dados, não executa — ok com o CSP) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{POST_TITLE}}",
  "description": "{{POST_DESCRIPTION}}",
  "datePublished": "{{POST_DATE_ISO}}",
  "dateModified": "{{POST_MODIFIED_ISO}}",
  "inLanguage": "pt-BR",
  "mainEntityOfPage": "https://dlt.academy/blog/{{POST_SLUG}}/",
  "image": "https://dlt.academy/blog/{{POST_SLUG}}/og-image.png",
  "author": { "@type": "Organization", "name": "DLT Academy", "url": "https://dlt.academy/" },
  "publisher": { "@type": "Organization", "name": "DLT Academy", "url": "https://dlt.academy/", "logo": { "@type": "ImageObject", "url": "https://dlt.academy/assets/dlt-logo-light.png" } }
}
</script>
</head>
<body>

<header class="top">
  <div class="wrap">
    <a class="brand" href="/"><img src="/assets/dlt-logo-light.png" alt="DLT Academy"></a>
  </div>
</header>

<main>
  <div class="article-wrap article">

    <div class="article-meta">
      <span class="tag s2">{{POST_TAG}}</span>
      <time datetime="{{POST_DATE_ISO}}">{{POST_DATE}}</time>
      <span>Atualizado em {{POST_MODIFIED}}</span>
    </div>
    <h1>{{POST_TITLE}}</h1>

    <div class="article-body">
{{POST_BODY}}
    </div>

  </div>
</main>

<footer>
  <div class="wrap">
    <p>Conteúdo educacional. Não é recomendação de investimento.</p>
    <p>© 2026 dltacademy</p>
  </div>
</footer>

</body>
</html>
